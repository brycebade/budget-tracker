<!DOCTYPE html>
<html lang="en" data-theme="sunset">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Budget Tracker | Dashboard</title>
</head>
<body class="min-h-screen bg-base-300">

    <header class="navbar fixed top-0 left-0 z-20 h-16 bg-base-100 border-base-300">
        <div class="navbar-start px-4">
            <h1 class="text-xl font-bold">Budget Tracker</h1>
        </div>

        <div class="navbar-end px-4">
            <button class="btn btn-primary">Add Account +</button>
        </div>
    </header>

    <aside class="fixed top-16 left-0 bottom-0 z-10 w-64 bg-base-200 border-r border-base-300">
        <nav class="p-4">
            <ul class="menu gap-2">
                <li><a class="active">Dashboard</a></li>
                <li><a>Accounts</a></li>
                <li><a>Transactions</a></li>
                <li><a>Budgets</a></li>
                <li><a>Bills</a></li>
            </ul>
        </nav>
    </aside>
    
    <main class="min-h-screen pt-16 ml-64">
        <div class="p-8">
            <div class="mb-6">
                <h2 class="text-2xl font-bold">Dashboard</h2>
            </div>
                
            <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
                <div class="card bg-base-100 shadow">
                    <div class="card-body">
                        <p class="text-sm text-base-content/70">Net Worth</p>
                        <p class="text-2xl font-bold">$0.00</p>
                    </div>
                </div>

                <div class="card bg-base-100 shadow">
                    <div class="card-body">
                        <p class="text-sm text-base-content/70">Total Debt</p>
                        <p class="text-2xl font-bold">$0.00</p>
                    </div>
                </div>

                <div class="card bg-base-100 shadow">
                    <div class="card-body">
                        <p class="text-sm text-base-content/70">Available Cash</p>
                        <p class="text-2xl font-bold">$0.00</p>
                    </div>
                </div>
            </div>
            
            <section class="mt-8">
                <h3 class="mb-4 text-xl font-bold">Accounts</h3>
                <div id="accountContainer"></div>
            </section>  
        </div>
    </main>

    

    
    <div class="hidden">
        <form id="accountForm" class="space-y-4">
            <div>
                <label class="label" for="accountName">
                    <span class="label-text">Account Name</span>
                </label>

                <input 
                    class="input input-bordered w-full"    
                    id="accountName" 
                    type="text" 
                    placeholder="Account Name" 
                    required
                >
            </div>

            <div>
                <label class="label" for="accountType">
                    <span class="label-text">Account Type</span>
                </label>

                <select 
                    class="select select-bordered w-full"
                    id="accountType" 
                    required
                >
                    <option value="" disabled selected>Select Account Type</option>
                    <option value="Checking">Checking</option>
                    <option value="Savings">Savings</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Loan">Loan</option>
                    <option value="Investment">Investment</option>
                </select>
            </div>

            <div>
                <label class="label" for="accountBalance">
                    <span class="label-text">Account Balance</span>
                </label>

                <input 
                    class="input input-bordered w-full"
                    id="accountBalance" 
                    type="number" 
                    step="0.01" 
                    required
                >
            </div>

            <div class="card-actions justify-end">
                <button 
                    class="btn btn-primary" 
                    id="addAccountBtn" 
                    type="submit">
                    Add Account
                </button>
            </div>
        </form>
    </div>
    
    <script src="./dashboard.js"></script>
</body>
</html>
