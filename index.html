<!DOCTYPE html>
<html lang="en" data-theme="sunset">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Budget Tracker</title>
</head>
<body>
    <h1>Budget Tracker</h1>

    <div class="card w-full bg-base-100 card-sm shadow-sm rounded-box">
            <form class="card-body" id="accountForm">
                <label class="card-title" for="accountName">Account Name:</label>
                <input id="accountName" type="text" placeholder="Account Name" required>
                <label for="accountType">Account Type:</label>
                <select id="accountType" required>
                    <option value="" disabled>Select Account Type</option>
                    <option value="Checking">Checking</option>
                    <option value="Savings">Savings</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Loan">Loan</option>
                    <option value="Investment">Investment</option>
                </select>
                <label for="accountBalance" required>Account Balance:</label>
                <input id="accountBalance" type="number" step="0.01" required>
                <div class="justify-end card-actions">
                    <button class="btn btn-primary" id="addAccountBtn" type="submit">Add Account</button>
                </div>
            </form>
    </div>

    <div id="accountContainer"></div>
    
    <script src="./index.js"></script>
</body>
</html>
