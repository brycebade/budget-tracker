<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
</head>
<body>
    <h1>Budget Tracker</h1>

    <form id="accountForm">
        <label for="accountName">Account Name:</label>
        <input id="accountName" type="text" placeholder="Enter Account Name">
        <label for="accountType">Account Type:</label>
        <select id="accountType">
            <option value="selectAccount" disabled>Select Account Type</option>
            <option value="checking">Checking</option>
            <option value="savings">Savings</option>
            <option value="credit_card">Credit Card</option>
            <option value="loan">Loan</option>
            <option value="investment">Investment</option>
        </select>
        <label for="accountBalance">Account Balance:</label>
        <input id="accountBalance" type="number" step="0.01">
        <button id="addAccountBtn" type="submit">Add Account</button>
    </form>

    <div id="accountContainer"></div>
    
    <script src="./index.js"></script>
</body>
</html>
