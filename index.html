<!DOCTYPE html>
<html lang="en" data-theme="sunset">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>Budget Tracker</title>
</head>
<body class="min-h-screen bg-base-300">

    <header class="navbar fixed top-0 left-0 z-20 h-16 bg-base-b border-base-300">
        <div class="flex-1 px-4">
            <h1 class="text-xl font-bold">Budget Tracker</h1>
        </div>
    </header>

    <aside class="fixed top-16 left-0 bottom-0 z-10 w-64 bg-base-200 border-r border-base-300">
        <nav class="p-4">
            <ul class="menu gap-2">
                <li><a class="active">Dashboard</a></li>
                <li><a>Accounts</a></li>
                <li><a>Transactions</a></li>
                <li><a>Budgets</a></li>
                <li><a>Bills</a></li>
            </ul>
        </nav>
    </aside>
    
    <main class="min-h-screen pt-16 ml-64">
        <div class="p-8">
            <div class="card w-full max-w-md bg-base-100 border border-base-300 shadow-xl rounded-box">
                <div class="card-body">
                    <h2 class="card-title">Add Account</h2>

                    <form id="accountForm" class="space-y-4">
                        <div>
                            <label class="card-title" for="accountName">
                                <span class="label-text">Account Name</span>
                            </label>

                            <input 
                                class="input input-bordered w-full"    
                                id="accountName" 
                                type="text" 
                                placeholder="Account Name" 
                                required
                            >
                        </div>

                        <div>
                            <label class="label" for="accountType">
                                <span class="label-text">Account Type</span>
                            </label>

                            <select 
                                class="select select-bordered w-full"
                                id="accountType" 
                                required
                            >
                                <option value="" disabled selected>Select Account Type</option>
                                <option value="Checking">Checking</option>
                                <option value="Savings">Savings</option>
                                <option value="Credit Card">Credit Card</option>
                                <option value="Loan">Loan</option>
                                <option value="Investment">Investment</option>
                            </select>
                        </div>

                        <div>
                            <label class="label" for="accountBalance">
                                <span class="label-text">Account Balance</span>
                            </label>

                            <input 
                                class="input input-bordered w-full"
                                id="accountBalance" 
                                type="number" 
                                step="0.01" 
                                required
                            >
                        </div>

                        <div class="card-actions justify-end">
                            <button 
                                class="btn btn-primary" 
                                id="addAccountBtn" 
                                type="submit">
                                Add Account
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="accountContainer"></div>
    
    <script src="./index.js"></script>
</body>
</html>
